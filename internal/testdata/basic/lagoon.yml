docker-compose-yaml: internal/testdata/basic/docker-compose.yml

environment_variables:
  git_sha: "true"

x-serversnippet: &serversnippet |
  set_real_ip_from 1.1.1.1/24;
  set_real_ip_from 1.2.3.4/24;
  add_header X-Lagoon-Testing "testing" always;
  more_clear_headers "x-lagoon";

environments:
  main:
    routes:
      - node:
          - example.com

  traefik:
    routes:
      - node:
          - example.com:
              annotations:
                nginx.ingress.kubernetes.io/permanent-redirect: https://example.com$request_uri
                nginx.ingress.kubernetes.io/server-snippet: *serversnippet
                nginx.ingress.kubernetes.io/cors-allow-origin: https://example.com
                nginx.ingress.kubernetes.io/enable-cors: 'true'
                nginx.ingress.kubernetes.io/cors-allow-credentials: 'true'
                nginx.ingress.kubernetes.io/cors-allow-headers: X-CustomHeader, Keep-Alive, User-Agent, Cache-Control, Content-Type, Authorization
                nginx.ingress.kubernetes.io/cors-allow-methods: GET, PUT, POST, DELETE, PATCH, OPTIONS
                nginx.ingress.kubernetes.io/whitelist-source-range: 2.2.2.2/24, 3.3.3.3/24
