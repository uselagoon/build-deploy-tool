services:
  basic:
    build:
      context: internal/testdata/basic/docker
      dockerfile: basic.dockerfile
    labels:
      lagoon.type: basic
      lagoon.service.usecomposeports: true
      lagoon.service.loadbalancer: true
      lagoon.service.loadbalancer.config: '{"ports":[{"port":8080,"protocol":"udp"}]}'
    ports:
      - '8080'
      - '8080/udp'